<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

   <header class="Main-Header">
    <div class="Background-img"></div>

    <p class="Header-p">
        <i>𝓼𝓽𝓮𝓹 <br> <span class="Header-span">𝑜𝓇𝒹𝑒𝓇𝒾𝓃𝑔</span></i>
    </p>


    <div class="Header-div">
        <a class="Header-a Home" href="">Home</a>
        <div class="cart-container">
            <a class="Header-a Cart" href="">Cart</a>
            <i class="fa-solid fa-bicycle"></i>
        </div>
    </div>

    <p class="Headet-Text">Fast and efficient, online ordering you must try.</p>


    <div class="burger-menu">
        <i class="fa-solid fa-bars"></i>
    </div>
    <div class="burger-dropdown">
        <a class="Header-a Home" href="">Home</a>
        <div class="cart-container">
            <a class="Header-a Cart" href="">Cart</a>
        </div>
    </div>
</header>
   

   

<p class="Categories">𝙘𝙖𝙩𝙚𝙜𝙤𝙧𝙞𝙚𝙨</p>

<main class="Main-Cont">
    <div class="curved-underline">
        <span class="category active">All</span>
        <span class="category">Salads</span>
        <span class="category">Soups</span>
        <span class="category">Chicken</span>
        <span class="category">Beef</span>
        <span class="category">Seafood</span>
        <span class="category">Vegetable</span>
        <span class="category">Bits&Bites</span>
        <span class="category">On-The-Side</span>
    </div>
</main>

<section class="Filter-Cont">
    <div class="Filter-Header">
        <p class="Filter">Filter <i class="fa-solid fa-filter"></i></p>
    </div>
    <div class="Filter-Range">
        <label id="spice-label">Spiciness: Not Chosen</label>
        <input type="range" min="0" max="4" value="0" id="range">
    </div>
    <div class="Filter-Option">
        <div>
            <input type="checkbox" id="no-nuts">
            <label for="no-nuts">No Nuts</label>
        </div>
        <div>
            <input type="checkbox" id="vegetable-only">
            <label for="vegetable-only">Vegetable Only</label>
        </div>
    </div>
    <div class="Filter-Buttons">
        <button class="reset-btn">RESET</button>
        <button class="apply-btn">APPLY FILTER</button>
    </div>
</section>

<footer class="dishes"></footer>

<script src="index.js"></script>
</body>
</html>


















    <script src="./index.js"></script>
</body>
</html>
